authorization:
  allowViewerQuestions: true
  allowContributorsToClaimTasks: true
  requireMaintainerForPlanApproval: true
  requireMaintainerForDocsAndMemory: true
  requireOwnerForInvites: false
  requireOwnerForRepoCreation: true
  requireOwnerForArchiveDelete: true
  requireGlobalOwnerForGatewayConfig: true

publishing:
  githubPages: true
  githubPagesStatus: "pending"
  githubPagesUrl: "https://garrin-project-labs.github.io/project-space-2d-mmo/"
  githubPagesSource: "main:/docs"
  publicDemos: true

starter:
  preset: "game-2d-phaser"

workflow:
  taskThreads: automatic
  taskCommandStyle: natural_language
  friendlyTaskName: quest
  requireMention: true
  jamMode: temporary_ambient
  branchNaming: "task/<id>-<slug>"
  requirePlanApproval: true
  requireMaintainerForDocsAndMemory: true
  allowBotMergeWithMaintainerApproval: true
  githubIssues: false

audit:
  level: medium
  path: ".project/audit/events.jsonl"
  includePrLinks: true
  includeDiscordThreadLinks: true
